
<h1>{{name}}</h1>

<dl>
    <td>Nombre:</td>
    <dd>{{name}}</dd>
    
    <td>Edad:</td>
    <dd>{{age}}</dd>

    <td>Método:</td>
    <dd>algún método</dd>

    <td>Descripción:</td>
    <dd>{{getHeroDescription()}}</dd>

    <td>Capitalizado:</td>
    <dd>{{capitalizedName}}</dd>

 
    <button 
        *ngIf="name !== 'Spiderman'"
        class="btn btn-primary mx-2" (click)="changeHero()">
        Cambiar nombre
    </button>

    <button
        *ngIf="resetForm()"
        class="btn btn-primary mx-2" (click)="resetForm()">
        Reset
    </button>
</dl>
